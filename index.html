<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Médica</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  margin:0;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{text-align:center;}

input,textarea{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.row{
  display:flex;
  gap:10px;
}

.row input{
  flex:1;
}

button{
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add{background:#ddd;}
.pdf{background:black;color:white;}
.word{background:#2563eb;color:white;}
.excel{background:#16a34a;color:white;}

img{
  max-width:120px;
  margin-top:10px;
}
pre{
  background:#f8f8f8;
  padding:10px;
  border-radius:8px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>Ficha Médica</h1>

<div class="card">
<h3>Foto</h3>
<input type="file" accept="image/*" onchange="loadPhoto(event)">
<img id="photoPreview">
</div>

<div class="card">
<h3>Dados Pessoais</h3>
<input id="nome" placeholder="Nome completo">
<input id="sns" placeholder="Nº SNS">
<input id="nascimento" type="date">
<input id="telefone" placeholder="Telefone">
<textarea id="morada" placeholder="Morada"></textarea>
</div>

<div class="card">
<h3>Contactos de Emergência</h3>
<div id="contactos"></div>
<button class="add" onclick="add('contactos')">+ Adicionar</button>
</div>

<div class="card">
<h3>Antecedentes</h3>
<div id="antecedentes"></div>
<button class="add" onclick="add('antecedentes')">+ Adicionar</button>
</div>

<div class="card">
<h3>Medicação</h3>
<div id="medicacao"></div>
<button class="add" onclick="add('medicacao')">+ Adicionar</button>
</div>

<div class="card">
<h3>Pré-visualização</h3>
<pre id="preview"></pre>
</div>

<div class="card">
<button class="pdf" onclick="pdf()">PDF</button>
<button class="word" onclick="word()">Word</button>
<button class="excel" onclick="excel()">Excel</button>
</div>

</div>

<script>

let foto="";

function loadPhoto(e){
  const r=new FileReader();
  r.onload=()=>{foto=r.result;document.getElementById('photoPreview').src=foto;}
  r.readAsDataURL(e.target.files[0]);
}

function add(id){
  const div=document.createElement("div");
  div.className="row";

  if(id==="contactos"){
    div.innerHTML=`<input placeholder="Nome"><input placeholder="Relação"><input placeholder="Telefone">`;
  }
  if(id==="antecedentes"){
    div.innerHTML=`<input placeholder="Condição"><input placeholder="Ano"><input placeholder="Obs">`;
  }
  if(id==="medicacao"){
    div.innerHTML=`<input placeholder="Medicamento"><input placeholder="Dose"><input placeholder="Obs">`;
  }

  document.getElementById(id).appendChild(div);
}

function get(){
  const read=id=>[...document.querySelectorAll('#'+id+' .row')]
    .map(r=>[...r.querySelectorAll('input')].map(i=>i.value));

  return{
    nome:nome.value,
    sns:sns.value,
    nascimento:nascimento.value,
    telefone:telefone.value,
    morada:morada.value,
    contactos:read("contactos"),
    antecedentes:read("antecedentes"),
    medicacao:read("medicacao")
  }
}

function atualizarPreview(){
  const d=get();

  document.getElementById("preview").textContent =
`FICHA MÉDICA

Nome: ${d.nome}
SNS: ${d.sns}
Nascimento: ${d.nascimento}
Telefone: ${d.telefone}
Morada: ${d.morada}

CONTACTOS DE EMERGÊNCIA
${d.contactos.map(c=>c.join(" | ")).join("\n") || "Sem contactos"}

ANTECEDENTES
${d.antecedentes.map(a=>a.join(" | ")).join("\n") || "Sem antecedentes"}

MEDICAÇÃO
${d.medicacao.map(m=>m.join(" | ")).join("\n") || "Sem medicação"}
`;
}

setInterval(atualizarPreview, 500);

function pdf(){
  const {jsPDF}=window.jspdf;
  const d=get();
  const p=new jsPDF();

  let y=10;

  p.text("FICHA MÉDICA",10,y);y+=10;

  if(foto)p.addImage(foto,"JPEG",150,10,40,40);

  p.text("Nome: "+d.nome,10,y+=10);
  p.text("SNS: "+d.sns,10,y+=8);
  p.text("Nascimento: "+d.nascimento,10,y+=8);
  p.text("Telefone: "+d.telefone,10,y+=8);
  p.text("Morada: "+d.morada,10,y+=8);

  function add(title,data){
    y+=10;
    p.text(title,10,y);y+=6;
    data.forEach(r=>{p.text(r.join(" | "),10,y);y+=6;});
  }

  add("Contactos de Emergência",d.contactos);
  add("Antecedentes",d.antecedentes);
  add("Medicação",d.medicacao);

  p.save("ficha.pdf");
}

function word(){
  const d=get();
  const t=`Ficha Médica

Nome: ${d.nome}
SNS: ${d.sns}
Nascimento: ${d.nascimento}
Telefone: ${d.telefone}
Morada: ${d.morada}`;
  const b=new Blob([t],{type:"application/msword"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="ficha.doc";
  a.click();
}

function excel(){
  const d=get();
  const ws=XLSX.utils.aoa_to_sheet([
    ["Nome",d.nome],
    ["SNS",d.sns],
    ["Nascimento",d.nascimento],
    ["Telefone",d.telefone],
    ["Morada",d.morada]
  ]);

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Ficha");
  XLSX.writeFile(wb,"ficha.xlsx");
}

</script>

</body>
</html>
