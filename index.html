<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ficha Médica</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:20px;background:#f4f4f4;}
section{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input{width:100%;padding:8px;margin:5px 0;}
button{padding:10px;margin:5px;cursor:pointer;}
.row{display:flex;gap:10px;margin-bottom:5px;}
.row input{flex:1;}
</style>
</head>
<body>

<h1>Ficha Médica</h1>

<section>
<h3>Dados Pessoais</h3>
<input id="nome" placeholder="Nome completo" />
<input id="sns" placeholder="Nº SNS" />
<input id="nascimento" type="date" />
<input id="telefone" placeholder="Telefone" />
<input id="morada" placeholder="Morada" />
</section>

<section>
<h3>Contactos de Emergência</h3>
<div id="contactos"></div>
<button onclick="addContacto()">+ Adicionar contacto</button>
</section>

<section>
<h3>Antecedentes</h3>
<div id="antecedentes"></div>
<button onclick="addAntecedente()">+ Adicionar antecedente</button>
</section>

<section>
<h3>Medicação</h3>
<div id="medicacao"></div>
<button onclick="addMedicacao()">+ Adicionar medicação</button>
</section>

<section>
<button onclick="exportPDF()">PDF</button>
<button onclick="exportWord()">Word</button>
<button onclick="exportExcel()">Excel</button>
</section>

<script>
function addContacto(){
const div=document.createElement('div');div.className='row';
div.innerHTML=`<input placeholder='Nome'><input placeholder='Relação'><input placeholder='Telefone'>`;
document.getElementById('contactos').appendChild(div);
}

function addAntecedente(){
const div=document.createElement('div');div.className='row';
div.innerHTML=`<input placeholder='Condição'><input placeholder='Ano'><input placeholder='Obs'>`;
document.getElementById('antecedentes').appendChild(div);
}

function addMedicacao(){
const div=document.createElement('div');div.className='row';
div.innerHTML=`<input placeholder='Medicamento'><input placeholder='Dose'><input placeholder='Obs'>`;
document.getElementById('medicacao').appendChild(div);
}

function getData(){
const readRows=(id)=>[...document.querySelectorAll('#'+id+' .row')].map(r=>
[...r.querySelectorAll('input')].map(i=>i.value)
);
return{
nome:document.getElementById('nome').value,
sns:document.getElementById('sns').value,
nascimento:document.getElementById('nascimento').value,
telefone:document.getElementById('telefone').value,
morada:document.getElementById('morada').value,
contactos:readRows('contactos'),
antecedentes:readRows('antecedentes'),
medicacao:readRows('medicacao')
};
}

function exportPDF(){
const { jsPDF } = window.jspdf;
const pdf=new jsPDF();
const d=getData();
let y=10;
pdf.text('Ficha Médica',10,y);y+=10;
pdf.text('Nome: '+d.nome,10,y);y+=10;
pdf.text('SNS: '+d.sns,10,y);y+=10;
pdf.text('Nascimento: '+d.nascimento,10,y);y+=10;
pdf.text('Telefone: '+d.telefone,10,y);y+=10;
pdf.text('Morada: '+d.morada,10,y);
pdf.save('ficha.pdf');
}

function exportWord(){
const d=getData();
const text=`Ficha Médica\n\nNome:${d.nome}\nSNS:${d.sns}\nNascimento:${d.nascimento}\nTelefone:${d.telefone}\nMorada:${d.morada}`;
const blob=new Blob([text],{type:'application/msword'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='ficha.doc';
a.click();
}

function exportExcel(){
const d=getData();
const ws=XLSX.utils.aoa_to_sheet([
['Campo','Valor'],
['Nome',d.nome],
['SNS',d.sns],
['Nascimento',d.nascimento],
['Telefone',d.telefone],
['Morada',d.morada]
]);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'Ficha');
XLSX.writeFile(wb,'ficha.xlsx');
}
</script>

</body>
</html>
